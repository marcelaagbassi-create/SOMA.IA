<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#0A0A0F"/>
<meta name="description" content="SOMA — Ton assistant IA personnel propulsé par Mistral Large"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="SOMA"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<title>SOMA — Assistant IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;height:100dvh;overflow:hidden;font-family:'Syne',sans-serif;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#2A2A35;border-radius:4px}
textarea,input,button{font-family:'Syne',sans-serif}
textarea{resize:none}
textarea:focus,input:focus{outline:none}

/* ── ANIMATIONS ── */
@keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-6px);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideRight{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes stopPulse{0%,100%{box-shadow:0 0 0 0 rgba(232,112,112,.25)}50%{box-shadow:0 0 0 7px rgba(232,112,112,0)}}
@keyframes micPulse{0%,100%{box-shadow:0 0 0 0 rgba(232,197,71,.3)}50%{box-shadow:0 0 0 8px rgba(232,197,71,0)}}

/* ── LAYOUT ── */
#app{display:flex;height:100dvh;overflow:hidden;transition:background .3s,color .3s}
#sidebar{display:flex;flex-direction:column;transition:width .3s cubic-bezier(.4,0,.2,1),min-width .3s cubic-bezier(.4,0,.2,1);overflow:hidden}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#messages{flex:1;overflow-y:auto;padding:28px 18px}
#messages-inner{max-width:700px;margin:0 auto;display:flex;flex-direction:column;gap:18px}

/* ── MSG BUBBLES ── */
.msg-row{display:flex;gap:12px;align-items:flex-start;animation:fadeUp .3s ease forwards}
.msg-row.user{flex-direction:row-reverse}
.avatar{width:34px;height:34px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#0A0A0F}
.bubble{max-width:78%;padding:13px 17px;font-size:14px;line-height:1.75;white-space:pre-wrap;word-break:break-word}
.bubble.user{border-radius:18px 4px 18px 18px}
.bubble.ai{border-radius:4px 18px 18px 18px}

/* ── TYPING DOTS ── */
.typing-dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.typing-dot:nth-child(1){animation:bounce 1.2s ease-in-out 0s infinite}
.typing-dot:nth-child(2){animation:bounce 1.2s ease-in-out .2s infinite}
.typing-dot:nth-child(3){animation:bounce 1.2s ease-in-out .4s infinite}

/* ── CONV ITEMS ── */
.conv-item{padding:9px 10px;border-radius:9px;cursor:pointer;font-size:13px;margin-bottom:2px;transition:all .18s;display:flex;align-items:center;gap:6px;position:relative;border-left:2px solid transparent}
.conv-item:hover .conv-dot{opacity:1!important}
.conv-dot{opacity:0;transition:opacity .15s;background:none;border:none;cursor:pointer;padding:2px 4px;font-size:16px;line-height:1;flex-shrink:0}

/* ── SUGGESTION CARDS ── */
.suggestion-btn{padding:13px 15px;border-radius:12px;cursor:pointer;text-align:left;font-size:13px;font-family:'Syne',sans-serif;font-weight:500;transition:all .2s;line-height:1.4;border:1px solid}

/* ── INPUT WRAP ── */
#input-wrap{display:flex;align-items:flex-end;gap:8px;border-radius:18px;padding:10px 10px 10px 12px;transition:border-color .2s,box-shadow .2s}
#input-wrap:focus-within{box-shadow:0 0 0 1px rgba(232,197,71,.1)}

/* ── DRAWER ── */
#drawer{position:fixed;top:0;right:0;bottom:0;width:280px;display:flex;flex-direction:column;z-index:201;animation:slideRight .25s cubic-bezier(.4,0,.2,1);box-shadow:-12px 0 40px rgba(0,0,0,.3)}
#drawer-overlay{position:fixed;inset:0;z-index:200;animation:fadeIn .2s ease}

/* ── FULL PANEL ── */
.full-panel{position:fixed;inset:0;z-index:500;display:flex;flex-direction:column;animation:slideUp .28s cubic-bezier(.4,0,.2,1)}
.full-panel-header{display:flex;align-items:center;gap:12px;padding:16px 20px}
.full-panel-body{flex:1;overflow-y:auto;padding:24px 20px}

/* ── CONTEXT MENU ── */
#ctx-menu{position:fixed;border-radius:14px;padding:6px;z-index:300;min-width:180px;box-shadow:0 12px 40px rgba(0,0,0,.4);animation:fadeUp .15s ease}
.ctx-btn{width:100%;display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;background:transparent;border:none;cursor:pointer;font-size:13px;font-family:'Syne',sans-serif;font-weight:600;text-align:left;transition:background .15s}

/* ── PLUS MENU ── */
#plus-menu{position:absolute;bottom:calc(100% + 8px);left:0;border-radius:16px;padding:8px;z-index:99;min-width:190px;box-shadow:0 12px 40px rgba(0,0,0,.35);animation:fadeUp .18s ease}
.plus-btn-item{width:100%;display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;background:transparent;border:none;cursor:pointer;font-size:14px;font-family:'Syne',sans-serif;font-weight:600;text-align:left;transition:background .15s}

/* ── TOGGLE ── */
.toggle-track{width:52px;height:28px;border-radius:14px;border:none;cursor:pointer;position:relative;transition:background .3s}
.toggle-thumb{position:absolute;top:3px;width:22px;height:22px;border-radius:50%;transition:left .3s;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.25)}

/* ── AUTH MODAL ── */
#auth-overlay{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease}
#auth-box{border-radius:20px;padding:32px 28px;width:380px;max-width:92vw;box-shadow:0 24px 80px rgba(0,0,0,.35)}

/* ── MISC ── */
.hidden{display:none!important}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:26px;text-align:center}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:13px 18px}
.info-row+.info-row{border-top:1px solid}
</style>
</head>
<body>

<!-- ── TEMPLATES (SVG icons) ───────────────────────────────────────────── -->

<!-- ── APP SHELL ─────────────────────────────────────────────────────────── -->
<div id="app">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div id="sidebar-top">

  <!-- MAIN -->
  <div id="main">

    <!-- HEADER -->
    <div id="header">

          <span id="header-title">SOMA</span>

<script>
// ═══════════════════════════════════════════════════════════════════════════════
// SOMA — Pure HTML5/JS · Mistral Large · No frameworks
// ═══════════════════════════════════════════════════════════════════════════════

// ── THEMES ────────────────────────────────────────────────────────────────────
const THEMES = {
  dark:{
    bg:"#0A0A0F",sidebar:"#0D0D14",border:"#1A1A25",card:"#131320",
    cardHover:"#16161F",input:"#0F0F18",inputBorder:"#252535",
    text:"#F0EDE8",subtext:"#8888AA",muted:"#55556A",
    accent:"#E8C547",accentDark:"#C4973A",cyan:"#5BE8C5",
    bubbleUser:"#1A2A3A",bubbleAi:"#131320",
    borderUser:"#2A4A5A",borderAi:"#1E1E2E",msgColor:"#E8E5E0",
    overlay:"rgba(0,0,0,0.75)",modalBg:"#0F0F1A",panelBg:"#111118",
    danger:"#E87070",dangerBg:"#1E1010",dangerBorder:"#5A2020",
  },
  light:{
    bg:"#F5F4F0",sidebar:"#EEEAE3",border:"#DDDAD2",card:"#FFFFFF",
    cardHover:"#F0EDE6",input:"#FFFFFF",inputBorder:"#D0CCC4",
    text:"#1A1814",subtext:"#6B6660",muted:"#9A9690",
    accent:"#C4973A",accentDark:"#A07B28",cyan:"#2A9E88",
    bubbleUser:"#E8F4FF",bubbleAi:"#FFFFFF",
    borderUser:"#B8D8F0",borderAi:"#E0DDD8",msgColor:"#2A2520",
    overlay:"rgba(0,0,0,0.45)",modalBg:"#FAFAF8",panelBg:"#F2EFE9",
    danger:"#C0392B",dangerBg:"#FFF0EE",dangerBorder:"#F5C6C0",
  }
};

const SUGGESTIONS = [
  "Explique-moi l'intelligence artificielle",
  "Écris un poème sur l'espace",
  "Aide-moi à coder en Python",
  "Résume les actualités tech"
];

const API_URL = "https://soma-server.onrender.com/api/chat";

// ── SVG HELPERS ───────────────────────────────────────────────────────────────
const svg = id => document.getElementById(id).innerHTML;
const icon = {
  mic:    () => svg('t-mic'),
  send:   () => svg('t-send'),
  stop:   () => svg('t-stop'),
  plus:   () => svg('t-plus'),
  menu:   () => svg('t-menu'),
  close:  () => svg('t-close'),
  back:   () => svg('t-back'),
  google: () => svg('t-google'),
  moon:   () => svg('t-moon'),
  sun:    () => svg('t-sun'),
  logout: () => svg('t-logout'),
  user:   () => `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`,
  info:   () => `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>`,
  gear:   () => `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>`,
  trash:  () => `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>`,
  share:  () => `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>`,
  edit:   () => `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,
  pin:    () => `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 17v5"/><path d="M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V16a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V7a1 1 0 0 1 1-1 2 2 0 0 0 0-4H8a2 2 0 0 0 0 4 1 1 0 0 1 1 1v3.76z"/></svg>`,
};

// ── STATE ──────────────────────────────────────────────────────────────────────
let state = {
  theme: 'dark',
  sidebarOpen: window.innerWidth > 600,
  messages: [],
  conversations: [{ id: 1, title: 'Nouvelle conversation', pinned: false }],
  activeConv: 1,
  loading: false,
  aborted: false,
  abortFlag: false,
  user: null,
  renamingId: null,
  renameVal: '',
  attachments: [],
  isListening: false,
  showPlusMenu: false,
  drawerOpen: false,
  fullPanel: null, // 'about'|'settings'|'account'
  showAuth: false,
  authMode: 'choice', // 'choice'|'login'|'register'|'profile'
  ctxMenu: null, // { convId, x, y }
  notifOn: true,
  historyOn: true,
  lang: 'fr',
  recognition: null,
};

let T = THEMES[state.theme];

// ── APPLY THEME ───────────────────────────────────────────────────────────────
function applyTheme() {
  T = THEMES[state.theme];
  const app = document.getElementById('app');
  app.style.background = T.bg;
  app.style.color = T.text;

  // sidebar
  const sb = document.getElementById('sidebar');
  sb.style.background = T.sidebar;
  sb.style.borderRight = `1px solid ${T.border}`;
  sb.style.width = state.sidebarOpen ? '265px' : '0';
  sb.style.minWidth = state.sidebarOpen ? '265px' : '0';

  // sidebar top
  styleEl('sidebar-top', `background:${T.sidebar};border-bottom:1px solid ${T.border};padding:22px 18px 14px`);
  styleEl('sidebar-logo', 'display:flex;align-items:center;gap:10px;margin-bottom:14px');
  styleEl('sidebar-logo-icon', `width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,${T.accent},${T.accentDark});display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#0A0A0F`);
  styleEl('sidebar-logo-text', `font-size:20px;font-weight:800;letter-spacing:-1px;color:${T.text}`);

  const ncb = document.getElementById('new-conv-btn');
  Object.assign(ncb.style, { width:'100%',padding:'10px 14px',background:T.card,border:`1px solid ${T.border}`,borderRadius:'10px',color:T.text,cursor:'pointer',fontSize:'13px',fontWeight:'600',display:'flex',alignItems:'center',gap:'8px',transition:'background .2s' });

// ── ACTION BUTTON (mic ↔ send) ─────────────────────────────────────────────
function updateActionBtn() {
  const btn = document.getElementById('action-btn');

  if (hasInput) {
    btn.style.cssText = `width:38px;height:38px;border-radius:11px;border:none;flex-shrink:0;background:linear-gradient(135deg,${T.accent},${T.accentDark});color:#0A0A0F;cursor:${state.loading?'default':'pointer'};display:flex;align-items:center;justify-content:center;transition:all .2s;opacity:${state.loading?.5:1}`;

// ── CONV LIST ─────────────────────────────────────────────────────────────────
function renderConvList() {
  const el = document.getElementById('conv-list');
  const sorted = [...state.conversations].sort((a,b) => (b.pinned?1:0)-(a.pinned?1:0));
  el.innerHTML = '';
  sorted.forEach(conv => {
    const div = document.createElement('div');
    div.className = 'conv-item';
    div.dataset.id = conv.id;
    const isActive = conv.id === state.activeConv;
    div.style.cssText = `padding:9px 10px;border-radius:9px;cursor:pointer;background:${isActive ? T.accent+'18' : 'transparent'};border-left:2px solid ${isActive ? T.accent : 'transparent'};font-size:13px;color:${isActive ? T.text : T.subtext};margin-bottom:2px;transition:all .18s;display:flex;align-items:center;gap:6px;position:relative`;

    if (state.renamingId === conv.id) {
      const inp = document.createElement('input');
      inp.value = state.renameVal;
      inp.style.cssText = `flex:1;background:transparent;border:none;border-bottom:1px solid ${T.accent};color:${T.text};font-size:13px;font-family:'Syne',sans-serif;outline:none;padding:1px 0`;
      inp.oninput = e => state.renameVal = e.target.value;
      inp.onblur = applyRename;
      inp.onkeydown = e => { if(e.key==='Enter') applyRename(); if(e.key==='Escape') { state.renamingId=null; renderConvList(); } };
      inp.onclick = e => e.stopPropagation();
      div.appendChild(inp);
      setTimeout(() => inp.focus(), 0);
    } else {
      if (conv.pinned) {
        const pin = document.createElement('span');
        pin.textContent = '📌'; pin.style.cssText = 'font-size:10px;flex-shrink:0';
        div.appendChild(pin);
      }
      const title = document.createElement('span');
      title.textContent = conv.title;
      title.style.cssText = 'flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis';
      div.appendChild(title);

      const dot = document.createElement('button');
      dot.className = 'conv-dot';
      dot.textContent = '⋯';
      dot.style.cssText = `opacity:0;transition:opacity .15s;background:none;border:none;color:${T.muted};cursor:pointer;padding:2px 4px;font-size:16px;line-height:1;flex-shrink:0`;
      dot.onclick = e => { e.stopPropagation(); showCtxMenu(conv.id, e.clientX, e.clientY); };
      div.appendChild(dot);
    }

    div.onclick = () => { if(state.renamingId !== conv.id) { state.activeConv = conv.id; state.messages = []; renderAll(); } };
    div.oncontextmenu = e => { e.preventDefault(); showCtxMenu(conv.id, e.clientX, e.clientY); };
    div.onmouseenter = () => { if(!state.renamingId) div.style.background = isActive ? T.accent+'18' : T.cardHover; const d = div.querySelector('.conv-dot'); if(d) d.style.opacity='1'; };
    div.onmouseleave = () => { div.style.background = isActive ? T.accent+'18' : 'transparent'; const d = div.querySelector('.conv-dot'); if(d) d.style.opacity='0'; };

    el.appendChild(div);
  });
}

// ── SEND MESSAGE ──────────────────────────────────────────────────────────────
async function sendMessage(text) {
  const ta = document.getElementById('msg-input');
  const userText = (text || ta.value).trim();
  if (!userText && state.attachments.length === 0) return;
  if (state.loading) return;

  ta.value = ''; ta.style.height = 'auto';
  state.aborted = false; state.abortFlag = false;
  state.attachments = [];

  const userMsg = { role:'user', content: userText || `📎 ${state.attachments[0]?.name}`, id: Date.now() };
  state.messages.push(userMsg);
  state.loading = true;

  // Update conv title on first message
  if (state.messages.length === 1) {
    state.conversations = state.conversations.map(c =>
      c.id === state.activeConv ? { ...c, title: userText.slice(0,30) + (userText.length>30?'…':'') } : c
    );
  }

  renderAll();

  const apiMessages = state.messages.slice(0,-1).concat([userMsg]).map(m => ({ role:m.role, content:m.content }));

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type':'application/json' },
      body: JSON.stringify({
        model: 'mistral-large-latest',
        max_tokens: 1000,
        system: 'Tu es SOMA, un assistant IA intelligent, créatif et bienveillant. Réponds en français sauf si l\'utilisateur parle une autre langue. Sois concis mais complet.',
        messages: apiMessages,
      }),
    });
    if (state.abortFlag) return;

    const data = await res.json();
    if (state.abortFlag) return;

    // Debug — log the full response to console
    console.log('[SOMA] Server response:', JSON.stringify(data));

    if (!res.ok) {
      const errMsg = data.error || data.message || `Erreur serveur (${res.status})`;
      state.messages.push({ role:'assistant', content:`⚠️ ${errMsg}`, id: Date.now()+1 });
      return;
    }

    // Server returns normalized format: { content: [{ type:'text', text:'...' }] }
    // Also handle raw Mistral format: { choices: [{ message: { content:'...' } }] }
    let txt = '';
    if (data.content && data.content[0]?.text) {
      txt = data.content[0].text;
    } else if (data.choices && data.choices[0]?.message?.content) {
      txt = data.choices[0].message.content;
    } else if (typeof data === 'string') {
      txt = data;
    } else {
      console.error('[SOMA] Unexpected response format:', data);
      txt = '⚠️ Format de réponse inattendu. Vérifie la console.';
    }

    state.messages.push({ role:'assistant', content:txt, id: Date.now()+1 });

  } catch(e) {
    console.error('[SOMA] Fetch error:', e);
    if (!state.abortFlag) {
      const isOffline = !navigator.onLine;
      const msg = isOffline
        ? '📡 Pas de connexion internet.'
        : '❌ Impossible de joindre le serveur. Il est peut-être en train de démarrer (Render Free peut prendre 50s). Réessaie dans quelques secondes.';
      state.messages.push({ role:'assistant', content: msg, id: Date.now()+1 });
    }
  } finally {
    if (!state.abortFlag) state.loading = false;
    renderAll();
  }
}

function stopGeneration() {
  state.abortFlag = true;
  state.loading = false;
  state.aborted = true;
  renderAll();
}

// ── MIC ───────────────────────────────────────────────────────────────────────
function toggleMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('La reconnaissance vocale n\'est pas supportée sur ce navigateur.'); return; }
  if (state.isListening) {
    state.recognition?.stop();
    state.isListening = false;
    updateActionBtn();
    return;
  }
  const rec = new SR();
  rec.lang = 'fr-FR'; rec.continuous = false; rec.interimResults = false;
  rec.onresult = e => {
    const t = e.results[0][0].transcript;
    const ta = document.getElementById('msg-input');
    ta.value = ta.value ? ta.value + ' ' + t : t;
    autoResize(ta); updateActionBtn();
  };
  rec.onend = () => { state.isListening = false; updateActionBtn(); };
  rec.onerror = () => { state.isListening = false; updateActionBtn(); };
  rec.start();
  state.recognition = rec;
  state.isListening = true;
  document.getElementById('msg-input').placeholder = '🎤 Écoute en cours…';
  updateActionBtn();
}

      { ic: '📎', label:'Fichier',         accept:'*/*' },

    ].map((item,i) => `
      <button class="plus-btn-item" onclick="triggerFile(${i})"
        style="width:100%;display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;background:transparent;border:none;color:${T.text};cursor:pointer;font-size:14px;font-family:'Syne',sans-serif;font-weight:600;text-align:left;transition:background .15s"

    // hidden file inputs
    pm.innerHTML += `

    pm.classList.add('hidden');
  }
  // Update plus btn style
  const pb = document.getElementById('plus-btn');
  pb.style.borderColor = state.showPlusMenu ? T.accent : T.border;
  pb.style.color = state.showPlusMenu ? T.accent : T.subtext;
}

function triggerFile(i) { document.getElementById('fi-'+i)?.click(); }
function handleFile(input, type) {
  if (input.files[0]) {
    state.attachments.push({ file: input.files[0], type });
    renderAttachments();
    updateActionBtn();
  }
  state.showPlusMenu = false;
  document.getElementById('plus-menu').classList.add('hidden');
}

function renderAttachments() {
  const el = document.getElementById('attach-preview');
  el.style.cssText = state.attachments.length ? `max-width:700px;margin:0 auto 8px;display:flex;gap:8px;flex-wrap:wrap` : '';
  el.innerHTML = state.attachments.map((a,i) => `
    <div style="display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;background:${T.card};border:1px solid ${T.border};font-size:12px;color:${T.text}">

      <span onclick="removeAttach(${i})" style="cursor:pointer;color:${T.muted};margin-left:2px">×</span>
    </div>`).join('');
}
function removeAttach(i) { state.attachments.splice(i,1); renderAttachments(); updateActionBtn(); }

function showCtxMenu(convId, x, y) {
  const el = document.getElementById('ctx-menu');
  const conv = state.conversations.find(c=>c.id===convId);
  el.style.cssText = `position:fixed;top:${Math.min(y,window.innerHeight-180)}px;left:${Math.min(x,window.innerWidth-200)}px;background:${T.modalBg};border:1px solid ${T.border};border-radius:14px;padding:6px;z-index:300;min-width:180px;box-shadow:0 12px 40px rgba(0,0,0,.4);animation:fadeUp .15s ease`;
  el.classList.remove('hidden');
  state.ctxMenu = { convId, x, y };

  el.innerHTML = [
    { ic: icon.pin(),   label: conv.pinned?'Désépingler':'Épingler', col: T.accent,  fn: `pinConv(${convId})` },
    { ic: icon.edit(),  label: 'Renommer',  col: T.text,   fn: `startRename(${convId})` },
    { ic: icon.share(), label: 'Partager',  col: T.cyan,   fn: `shareConv(${convId})` },
    { ic: icon.trash(), label: 'Supprimer', col: T.danger, fn: `deleteConv(${convId})` },
  ].map(item => `
    <button class="ctx-btn" onclick="${item.fn};closeCtxMenu()"
      style="width:100%;display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;background:transparent;border:none;color:${item.col};cursor:pointer;font-size:13px;font-family:'Syne',sans-serif;font-weight:600;text-align:left;transition:background .15s"
      onmouseenter="this.style.background='${T.cardHover}'" onmouseleave="this.style.background='transparent'">
      ${item.ic}${item.label}
    </button>`).join('');
}
function closeCtxMenu() { document.getElementById('ctx-menu').classList.add('hidden'); state.ctxMenu = null; }

// ── CONV ACTIONS ──────────────────────────────────────────────────────────────
function newConversation() {
  const id = Date.now();
  state.conversations.unshift({ id, title:'Nouvelle conversation', pinned:false });
  state.activeConv = id; state.messages = []; state.aborted = false;
  renderAll();
}
function deleteConv(id) {
  state.conversations = state.conversations.filter(c=>c.id!==id);
  if (state.activeConv===id) { state.messages = []; state.activeConv = state.conversations[0]?.id||null; }
  renderAll();
}
function pinConv(id) {
  state.conversations = state.conversations.map(c=>c.id===id?{...c,pinned:!c.pinned}:c);
  renderAll();
}
function shareConv(id) {
  const conv = state.conversations.find(c=>c.id===id);
  const text = `Conversation SOMA: "${conv.title}"`;
  if (navigator.share) navigator.share({title:'SOMA',text}).catch(()=>{});
  else navigator.clipboard?.writeText(text).then(()=>alert('Copié !'));
}
function startRename(id) {
  const conv = state.conversations.find(c=>c.id===id);
  state.renamingId = id; state.renameVal = conv.title;
  renderConvList();
}
function applyRename() {
  if (state.renameVal.trim()) {
    state.conversations = state.conversations.map(c=>c.id===state.renamingId?{...c,title:state.renameVal.trim()}:c);
  }
  state.renamingId = null; renderConvList();
}

// ── TEXTAREA AUTO-RESIZE ──────────────────────────────────────────────────────
function autoResize(ta) {
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 160) + 'px';
}

// ── FULL PANELS ───────────────────────────────────────────────────────────────

  el.style.cssText = `position:fixed;inset:0;background:${T.modalBg};z-index:500;display:flex;flex-direction:column;animation:slideUp .28s cubic-bezier(.4,0,.2,1)`;

    <button onclick="closePanel('${name}')" style="width:38px;height:38px;border-radius:10px;background:${T.card};border:1px solid ${T.border};color:${T.text};cursor:pointer;display:flex;align-items:center;justify-content:center">${icon.back()}</button>
    <span style="font-size:17px;font-weight:800;color:${T.text}">${{about:'À propos',settings:'Paramètres',account:'Compte'}[name]}</span>
  </div>

        <div style="font-size:26px;font-weight:800;color:${T.text};letter-spacing:-1px">SOMA</div>
        <div style="font-size:12px;color:${T.accent};font-weight:700;letter-spacing:2px;margin-top:4px">VERSION 1.0.0 · BETA</div>
        <p style="font-size:14px;color:${T.subtext};margin-top:14px;line-height:1.8;max-width:360px;margin-left:auto;margin-right:auto">SOMA est un assistant IA conversationnel alimenté par Mistral Large. Conçu pour être rapide, intelligent et beau.</p>
      </div>
      <div style="background:${T.card};border-radius:16px;border:1px solid ${T.border};overflow:hidden">
        ${[['Modèle IA','Mistral Large'],['Backend','Render (Node.js)'],['Auth','Firebase'],['Base de données','Firestore'],['Hébergement','GitHub Pages + Render'],['Développé par','Toi + Claude 🤝']].map(([k,v],i,a)=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 18px;${i<a.length-1?'border-bottom:1px solid '+T.border:''}">

function closePanel(name) {
  document.getElementById('panel-'+name).classList.add('hidden');

}

function renderAccountHTML() {
  if (state.user) return `
    <div style="display:flex;flex-direction:column;gap:16px">
      <div style="text-align:center;padding:28px 0 16px">
        <div style="width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,${T.cyan},#3BBFA3);display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:800;color:#0A0A0F;margin:0 auto 14px">${state.user.name[0].toUpperCase()}</div>

        <div style="display:inline-flex;align-items:center;gap:6px;margin-top:8px;padding:4px 12px;border-radius:20px;background:${T.cyan}18;border:1px solid ${T.cyan}44;color:${T.cyan};font-size:12px;font-weight:700">${state.user.method==='google'?'🟢 Google':'📧 Email'} · Connecté</div>

      </div>
      <button onclick="state.user=null;renderAll();openPanel('account')" style="width:100%;padding:14px;border-radius:14px;background:${T.dangerBg};border:1px solid ${T.dangerBorder};color:${T.danger};cursor:pointer;font-size:14px;font-weight:700;font-family:'Syne',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px">${icon.logout()}Se déconnecter</button>
    </div>`;

  return `
    <div style="display:flex;flex-direction:column;gap:14px" id="auth-inner">
      <div style="text-align:center;padding:20px 0 8px">
        <div style="font-size:44px;margin-bottom:8px">👋</div>
        <div style="font-size:20px;font-weight:800;color:${T.text}">Bienvenue sur SOMA</div>
        <p style="font-size:13px;color:${T.subtext};margin-top:8px;line-height:1.7">Connecte-toi pour sauvegarder tes conversations.</p>

function bindAccountEvents() {}

function showEmailForm(mode) {
  const inner = document.getElementById('auth-inner');
  if (!inner) return;
  inner.innerHTML = `
    <div style="padding:16px 0 8px">
      <div style="font-size:20px;font-weight:800;color:${T.text};margin-bottom:6px">${mode==='login'?'Connexion':'Créer un compte'}</div>
      <p style="font-size:13px;color:${T.subtext}">${mode==='login'?'Content de te revoir !':'Rejoins SOMA gratuitement'}</p>
    </div>
    <div id="auth-err" style="display:none;font-size:12px;color:${T.danger};background:${T.dangerBg};border:1px solid ${T.dangerBorder};border-radius:10px;padding:10px 14px"></div>
    ${mode==='register'?`<input id="a-name" placeholder="Ton prénom" style="width:100%;padding:14px;border-radius:12px;background:${T.input};border:1px solid ${T.inputBorder};color:${T.text};font-size:14px;font-family:'Syne',sans-serif">`:''}
    <input id="a-email" type="email" placeholder="Email" style="width:100%;padding:14px;border-radius:12px;background:${T.input};border:1px solid ${T.inputBorder};color:${T.text};font-size:14px;font-family:'Syne',sans-serif">
    <input id="a-pass" type="password" placeholder="Mot de passe" style="width:100%;padding:14px;border-radius:12px;background:${T.input};border:1px solid ${T.inputBorder};color:${T.text};font-size:14px;font-family:'Syne',sans-serif">
    <button onclick="submitAuth('${mode}')" style="width:100%;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,${T.accent},${T.accentDark});color:#0A0A0F;font-size:15px;font-weight:800;font-family:'Syne',sans-serif;cursor:pointer">${mode==='login'?'Se connecter →':'Créer mon compte →'}</button>
    <div style="text-align:center;font-size:13px">
      <span onclick="showEmailForm('${mode==='login'?'register':'login'}')" style="color:${T.accent};cursor:pointer;font-weight:600">${mode==='login'?'Créer un compte':'Déjà un compte ? Connexion'}</span>
    </div>
    <p style="text-align:center;font-size:11px;color:${T.muted}">🔒 Sécurisé par Firebase</p>`;
}

function submitAuth(mode) {
  const email = document.getElementById('a-email')?.value;
  const pass  = document.getElementById('a-pass')?.value;
  const name  = document.getElementById('a-name')?.value;
  const err   = document.getElementById('auth-err');
  if (!email||!pass) { err.style.display='block'; err.textContent='Remplis tous les champs.'; return; }
  if (mode==='register'&&!name) { err.style.display='block'; err.textContent='Entre ton prénom.'; return; }
  state.user = { name: name||email.split('@')[0], email, method:'email' };
  renderAll();
  openPanel('account');
}

function loginWith(method) {
  state.user = { name:'Utilisateur Google', email:'user@gmail.com', method:'google' };
  renderAll();
  openPanel('account');
}

function openAuth() { openPanel('account'); }

// ── THEME TOGGLE ──────────────────────────────────────────────────────────────
function toggleTheme() {
  state.theme = state.theme==='dark'?'light':'dark';
  document.querySelector('meta[name="theme-color"]').content = THEMES[state.theme].bg;
  renderAll();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {

  // Sidebar toggle
  document.getElementById('sidebar-toggle-btn').onclick = () => {
    state.sidebarOpen = !state.sidebarOpen;
    renderAll();
  };

  // New conv
  document.getElementById('new-conv-btn').onclick = newConversation;

  // Menu btn
  document.getElementById('menu-btn').onclick = openDrawer;

  // Textarea
  const ta = document.getElementById('msg-input');
  ta.addEventListener('input', () => { autoResize(ta); updateActionBtn(); });
  ta.addEventListener('keydown', e => {
    if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  // Plus btn
  document.getElementById('plus-btn').onclick = (e) => { e.stopPropagation(); togglePlusMenu(); };

  // Login CTA
  document.getElementById('login-cta').onclick = openAuth;

  // Close menus on outside click
  document.addEventListener('click', e => {
    if (state.ctxMenu && !document.getElementById('ctx-menu').contains(e.target)) closeCtxMenu();
    if (state.showPlusMenu && !document.getElementById('plus-btn').contains(e.target) && !document.getElementById('plus-menu').contains(e.target)) {
      state.showPlusMenu = false;
      document.getElementById('plus-menu').classList.add('hidden');
      const pb = document.getElementById('plus-btn');
      pb.style.borderColor = T.border; pb.style.color = T.subtext;
    }
  });

  // Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  }

  renderAll();
});
</script>
