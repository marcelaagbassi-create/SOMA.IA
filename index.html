<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-app.js";
import { getAuth, signInWithPopup, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, addDoc, getDocs, deleteDoc, updateDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDX7RzeGcJcYYBEUKYMTRiqmQQnD7OYhnM",
  authDomain: "soma-ai-a7322.firebaseapp.com",
  projectId: "soma-ai-a7322",
  storageBucket: "soma-ai-a7322.firebasestorage.app",
  messagingSenderId: "447280140943",
  appId: "1:447280140943:web:40e7022b81bb6781ae56fa"
};

const app   = initializeApp(firebaseConfig);
const auth  = getAuth(app);
const db    = getFirestore(app);
const gProvider = new GoogleAuthProvider();

// ── Expose to global scope ──────────────────────────────────────────────────
window.SOMA_AUTH = {
  signInGoogle: () => signInWithPopup(auth, gProvider),
  signInEmail:  (email, pass) => signInWithEmailAndPassword(auth, email, pass),
  signUp:       async (name, email, pass) => {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    await updateProfile(cred.user, { displayName: name });
    return cred;
  },
  signOut: () => signOut(auth),
  onAuth:  (cb) => onAuthStateChanged(auth, cb),

  // Firestore conversations
  saveConv: async (uid, conv) => {
    await setDoc(doc(db, 'users', uid, 'conversations', String(conv.id)), conv);
  },
  loadConvs: async (uid) => {
    const q = query(collection(db, 'users', uid, 'conversations'), orderBy('updatedAt', 'desc'));
    const snap = await getDocs(q);
    return snap.docs.map(d => d.data());
  },
  deleteConv: async (uid, convId) => {
    await deleteDoc(doc(db, 'users', uid, 'conversations', String(convId)));
  },
  saveMsg: async (uid, convId, messages) => {
    await updateDoc(doc(db, 'users', uid, 'conversations', String(convId)), {
      messages, updatedAt: Date.now()
    });
  }
};

// Listen auth state
onAuthStateChanged(auth, (user) => {
  window.dispatchEvent(new CustomEvent('soma-auth', { detail: user }));
});
</script>

// ── TOAST ──────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg, isErr=false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.cssText = `position:fixed;bottom:100px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;animation:fadeUp .3s ease;background:${isErr?T.dangerBg:T.card};color:${isErr?T.danger:T.text};border:1px solid ${isErr?T.dangerBorder:T.border}`;
  el.classList.remove('hidden');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.add('hidden'), 3000);
}

// ── USER DISPLAY ───────────────────────────────────────────────────────────
function userName() {
  if (!S.firebaseUser) return null;
  return S.firebaseUser.displayName || S.firebaseUser.email?.split('@')[0] || 'Utilisateur';
}
function userInitial() { return (userName()||'U')[0].toUpperCase(); }
function userMethod() {
  if (!S.firebaseUser) return '';
  const p = S.firebaseUser.providerData?.[0]?.providerId || '';
  return p.includes('google') ? 'google' : 'email';
}

// ── FIREBASE: load/save conversations ─────────────────────────────────────
async function syncConvsFromFirebase() {
  if (!S.firebaseUser || !window.SOMA_AUTH) return;
  try {
    const convs = await window.SOMA_AUTH.loadConvs(S.firebaseUser.uid);
    if (convs.length > 0) {
      S.conversations = convs;
      S.activeConv = convs[0].id;
      S.messages = convs[0].messages || [];
    }
  } catch(e) { console.warn('Firestore load error:', e); }
}

async function saveCurrentConv() {
  if (!S.firebaseUser || !window.SOMA_AUTH) return;
  const conv = S.conversations.find(c=>c.id===S.activeConv);
  if (!conv) return;
  try {
    await window.SOMA_AUTH.saveConv(S.firebaseUser.uid, { ...conv, messages: S.messages, updatedAt: Date.now() });
  } catch(e) { console.warn('Firestore save error:', e); }
}

// ── CONV LIST ──────────────────────────────────────────────────────────────
function renderConvList() {
  const el = document.getElementById('conv-list');
  const sorted = [...S.conversations].sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0));
  el.innerHTML = '';
  sorted.forEach(conv => {
    const div = document.createElement('div');
    div.className = 'conv-item';
    const active = conv.id === S.activeConv;
    div.style.cssText = `padding:9px 10px;border-radius:9px;cursor:pointer;background:${active?T.accent+'18':'transparent'};border-left:2px solid ${active?T.accent:'transparent'};font-size:13px;color:${active?T.text:T.subtext};margin-bottom:2px;transition:all .18s;display:flex;align-items:center;gap:6px;position:relative`;

    if (S.renamingId===conv.id) {
      const inp = document.createElement('input');
      inp.value = S.renameVal;
      inp.style.cssText = `flex:1;background:transparent;border:none;border-bottom:1px solid ${T.accent};color:${T.text};font-size:13px;font-family:'Syne',sans-serif;outline:none;padding:1px 0`;
      inp.oninput = e => S.renameVal = e.target.value;
      inp.onblur = applyRename;
      inp.onkeydown = e => { if(e.key==='Enter') applyRename(); if(e.key==='Escape'){S.renamingId=null;renderConvList();} };
      inp.onclick = e => e.stopPropagation();
      div.appendChild(inp); setTimeout(()=>inp.focus(),0);
    } else {
      if (conv.pinned) { const p=document.createElement('span'); p.textContent='📌'; p.style.cssText='font-size:10px;flex-shrink:0'; div.appendChild(p); }
      const title = document.createElement('span');

// ── SEND MESSAGE ───────────────────────────────────────────────────────────
async function sendMessage(text) {
  const ta = document.getElementById('msg-input');
  const userText = (text||ta.value).trim();
  if (!userText && S.attachments.length===0) return;
  if (S.loading) return;
  ta.value=''; ta.style.height='auto';
  S.aborted=false; S.abortFlag=false; S.attachments=[];

  const userMsg = { role:'user', content:userText, id:Date.now() };
  S.messages.push(userMsg);
  S.loading=true;

  if (S.messages.length===1) {
    S.conversations = S.conversations.map(c=>c.id===S.activeConv?{...c,title:userText.slice(0,30)+(userText.length>30?'…':''),updatedAt:Date.now()}:c);
  }
  renderAll();

  const apiMessages = S.messages.slice(0,-1).concat([userMsg]).map(m=>({role:m.role,content:m.content}));
  try {
    const res = await fetch(API_URL, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ model:'mistral-large-latest', max_tokens:1000,
        system:"Tu es SOMA, un assistant IA intelligent et bienveillant. Réponds en français sauf si l'utilisateur parle une autre langue.",
        messages:apiMessages }),
    });
    if (S.abortFlag) return;
    const raw = await res.text();
    if (S.abortFlag) return;
    let data; try { data=JSON.parse(raw); } catch { data={}; }
    console.log('[SOMA] Response:', data);
    if (!res.ok) { S.messages.push({role:'assistant',content:`⚠️ ${data.error||'Erreur serveur ('+res.status+')'}`,id:Date.now()+1}); return; }
    const txt = data.content?.[0]?.text || data.choices?.[0]?.message?.content || '⚠️ Réponse vide.';
    S.messages.push({role:'assistant',content:txt,id:Date.now()+1});
    // Auto-save to Firestore
    S.conversations = S.conversations.map(c=>c.id===S.activeConv?{...c,messages:S.messages,updatedAt:Date.now()}:c);
    saveCurrentConv();
  } catch(e) {
    console.error('[SOMA]',e);
    if (!S.abortFlag) {
      const msg = !navigator.onLine ? '📡 Pas de connexion internet.' : '❌ Serveur inaccessible. Render Free peut prendre ~50s à démarrer. Réessaie.';
      S.messages.push({role:'assistant',content:msg,id:Date.now()+1});
    }
  } finally { if(!S.abortFlag) S.loading=false; renderAll(); }
}

function stopGeneration() { S.abortFlag=true; S.loading=false; S.aborted=true; renderAll(); }

// ── MIC ────────────────────────────────────────────────────────────────────
function toggleMic() {
  const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
  if (!SR) { toast('Reconnaissance vocale non supportée',true); return; }
  if (S.isListening) { S.recognition?.stop(); S.isListening=false; updateActionBtn(); return; }
  const rec = new SR(); rec.lang='fr-FR'; rec.continuous=false; rec.interimResults=false;
  rec.onresult = e => { const ta=document.getElementById('msg-input'); ta.value=(ta.value?ta.value+' ':'')+e.results[0][0].transcript; autoResize(ta); updateActionBtn(); };
  rec.onend = () => { S.isListening=false; document.getElementById('msg-input').placeholder='Message à SOMA…'; updateActionBtn(); };
  rec.onerror = () => { S.isListening=false; updateActionBtn(); };
  rec.start(); S.recognition=rec; S.isListening=true;
  document.getElementById('msg-input').placeholder='🎤 Écoute en cours…';
  updateActionBtn();
}

      <input id="fi-1" type="file" accept="*/*" style="display:none" onchange="handleFile(this,1)">
      <input id="fi-2" type="file" accept="image/*" capture="environment" style="display:none" onchange="handleFile(this,2)">`;
  } else { pm.classList.add('hidden'); }
  document.getElementById('plus-btn').style.borderColor = S.showPlusMenu?T.accent:T.border;
  document.getElementById('plus-btn').style.color = S.showPlusMenu?T.accent:T.subtext;
}
function triggerFile(i) { document.getElementById('fi-'+i)?.click(); }
function handleFile(input,type) {
  if(input.files[0]){ S.attachments.push({file:input.files[0],type}); updateActionBtn(); }
  S.showPlusMenu=false; document.getElementById('plus-menu').classList.add('hidden');
}

function showCtxMenu(convId,x,y) {

// ── CONV ACTIONS ───────────────────────────────────────────────────────────
function newConversation() {
  const id=Date.now();
  S.conversations.unshift({id,title:'Nouvelle conversation',pinned:false,messages:[],updatedAt:Date.now()});
  S.activeConv=id; S.messages=[]; S.aborted=false; renderAll();
}
function deleteConv(id) {
  if(S.firebaseUser && window.SOMA_AUTH) window.SOMA_AUTH.deleteConv(S.firebaseUser.uid,id);
  S.conversations=S.conversations.filter(c=>c.id!==id);
  if(S.activeConv===id){ S.messages=[]; S.activeConv=S.conversations[0]?.id||null; }
  renderAll();
}
function pinConv(id) { S.conversations=S.conversations.map(c=>c.id===id?{...c,pinned:!c.pinned}:c); renderAll(); }
function shareConv(id) {
  const conv=S.conversations.find(c=>c.id===id);
  const text=`Conversation SOMA: "${conv.title}"`;
  if(navigator.share) navigator.share({title:'SOMA',text}).catch(()=>{});
  else navigator.clipboard?.writeText(text).then(()=>toast('📋 Lien copié !'));
}
function startRename(id) { const conv=S.conversations.find(c=>c.id===id); S.renamingId=id; S.renameVal=conv.title; renderConvList(); }
function applyRename() {
  if(S.renameVal.trim()) S.conversations=S.conversations.map(c=>c.id===S.renamingId?{...c,title:S.renameVal.trim()}:c);
  S.renamingId=null; renderConvList();
}

function showEmailForm(mode) {
  const inner=document.getElementById('auth-inner');
  if (!inner) return;
  inner.innerHTML=`
    <div style="padding:16px 0 8px">
      <div style="font-size:20px;font-weight:800;color:${T.text};margin-bottom:6px">${mode==='login'?'Connexion':'Créer un compte'}</div>

    <div id="auth-err" style="display:none;font-size:12px;color:${T.danger};background:${T.dangerBg};border:1px solid ${T.dangerBorder};border-radius:10px;padding:10px 14px"></div>
    ${mode==='register'?`<input id="a-name" placeholder="Ton prénom" style="width:100%;padding:14px;border-radius:12px;background:${T.input};border:1px solid ${T.inputBorder};color:${T.text};font-size:14px;font-family:'Syne',sans-serif;margin-bottom:10px">`:''}
    <input id="a-email" type="email" placeholder="Email" style="width:100%;padding:14px;border-radius:12px;background:${T.input};border:1px solid ${T.inputBorder};color:${T.text};font-size:14px;font-family:'Syne',sans-serif;margin-bottom:10px">
    <input id="a-pass" type="password" placeholder="Mot de passe (min. 6 caractères)" style="width:100%;padding:14px;border-radius:12px;background:${T.input};border:1px solid ${T.inputBorder};color:${T.text};font-size:14px;font-family:'Syne',sans-serif;margin-bottom:14px">
    <button id="a-submit" onclick="submitEmailAuth('${mode}')" style="width:100%;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,${T.accent},${T.accentDark});color:#0A0A0F;font-size:15px;font-weight:800;font-family:'Syne',sans-serif;cursor:pointer">${mode==='login'?'Se connecter →':'Créer mon compte →'}</button>
    <div style="text-align:center;font-size:13px;margin-top:8px">
      <span onclick="showEmailForm('${mode==='login'?'register':'login'}')" style="color:${T.accent};cursor:pointer;font-weight:600">${mode==='login'?'Créer un compte':'Déjà un compte ?'}</span>
      · <span onclick="openPanel('account')" style="color:${T.subtext};cursor:pointer">Retour</span>
    </div>`; }

async function submitEmailAuth(mode) {
  if (!window.SOMA_AUTH) { toast('Firebase non chargé',true); return; }
  const email=document.getElementById('a-email')?.value;
  const pass=document.getElementById('a-pass')?.value;
  const name=document.getElementById('a-name')?.value;
  const err=document.getElementById('auth-err');
  const btn=document.getElementById('a-submit');
  if (!email||!pass){ err.style.display='block'; err.textContent='Remplis tous les champs.'; return; }
  if (mode==='register'&&!name){ err.style.display='block'; err.textContent='Entre ton prénom.'; return; }
  btn.textContent='⏳ En cours…'; btn.disabled=true;
  try {
    if (mode==='register') await window.SOMA_AUTH.signUp(name,email,pass);
    else await window.SOMA_AUTH.signInEmail(email,pass);
    closePanel('account');
  } catch(e) {
    console.error(e);
    const msgs={'auth/email-already-in-use':'Email déjà utilisé.','auth/wrong-password':'Mot de passe incorrect.','auth/user-not-found':'Aucun compte avec cet email.','auth/weak-password':'Mot de passe trop court (min. 6 caractères).','auth/invalid-email':'Email invalide.'};
    err.style.display='block'; err.textContent=msgs[e.code]||e.message;
    btn.textContent=mode==='login'?'Se connecter →':'Créer mon compte →'; btn.disabled=false;
  }
}

  document.addEventListener('click', e => {
    if (S.ctxMenu && !document.getElementById('ctx-menu').contains(e.target)) closeCtxMenu();
    if (S.showPlusMenu && !document.getElementById('plus-btn').contains(e.target) && !document.getElementById('plus-menu').contains(e.target)) {
      S.showPlusMenu=false; document.getElementById('plus-menu').classList.add('hidden');
      document.getElementById('plus-btn').style.borderColor=T.border; document.getElementById('plus-btn').style.color=T.subtext;
    }
  });

  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});

  renderAll();
});
</script>
</body>
</html>
